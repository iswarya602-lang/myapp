<!DOCTYPE html>
<html>
<head>
    <title>Food Delivery App</title>
    <style>
        body{
            font-family: Arial;
            background:#f5f5f5;
            text-align:center;
            padding:50px;
        }

        h1{
            color:#ff5722;
        }

        .card{
            background:white;
            width:300px;
            margin:auto;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        button{
            background:#ff5722;
            color:white;
            border:none;
            padding:10px 20px;
            border-radius:5px;
            cursor:pointer;
        }
    </style>
</head>

<body>

    <h1>🍔 Food Delivery Application</h1>

    <div class="card">
        <h2>Pizza</h2>
        <p>Price: ₹299</p>
        <button>Order Now</button>
    </div>

    <br>

    <div class="card">
        <h2>Burger</h2>
        <p>Price: ₹199</p>
        <button>Order Now</button>
    </div>

    <br>

    <div class="card">
        <h2>Biryani</h2>
        <p>Price: ₹249</p>
        <button>Order Now</button>
    </div>

    <h3>
        Deployed using GitHub + CodePipeline + CodeBuild + EKS
    </h3>

</body>
</html>
